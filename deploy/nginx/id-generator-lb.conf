worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    resolver 127.0.0.11 valid=5s ipv6=off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    upstream id_generator_backend {
        zone id_generator_backend 64k;
        server deploy-id-generator-1:8011 max_fails=3 fail_timeout=5s;
        server deploy-id-generator-2:8011 max_fails=3 fail_timeout=5s;
        keepalive 256;
    }

    access_log off;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 8011;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 2s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_pass http://id_generator_backend;
        }
    }
}
