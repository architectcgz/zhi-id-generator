version: '3.8'

services:
  # PostgreSQL Database
  id-generator-postgres:
    image: postgres:16-alpine
    container_name: id-generator-dev-postgres
    environment:
      POSTGRES_DB: id_generator
      POSTGRES_USER: id_gen_user
      POSTGRES_PASSWORD: id_gen_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./postgres/init-scripts/02-test-data.sql:/docker-entrypoint-initdb.d/02-test-data.sql:ro
    networks:
      - id-generator-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U id_gen_user -d id_generator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ID Generator Server (optional - for local testing)
  id-generator-server:
    build:
      context: ../../zhi-id-generator-go
      dockerfile: Dockerfile
    container_name: id-generator-dev-server
    environment:
      HTTP_ADDR: :8011
      DATABASE_URL: postgres://id_gen_user:id_gen_password@id-generator-postgres:5432/id_generator?sslmode=disable
      DATACENTER_ID: 0
      WORKER_ID: -1
      SNOWFLAKE_EPOCH: 1735689600000
    ports:
      - "8011:8011"
    depends_on:
      id-generator-postgres:
        condition: service_healthy
    networks:
      - id-generator-network
    restart: unless-stopped
    profiles:
      - full

volumes:
  postgres_data:
    driver: local

networks:
  id-generator-network:
    driver: bridge
