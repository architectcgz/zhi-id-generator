server:
  port: 8011

spring:
  application:
    name: id-generator-service
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/id_generator
    username: ${DB_USER:id_gen_user}
    password: ${DB_PASSWORD:id_gen_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.platform.idgen.infrastructure.persistence.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ID Generator Configuration
id-generator:
  segment:
    # Segment cache update interval (seconds)
    cache-update-interval: 60
    # Segment duration (milliseconds)
    segment-duration: 900000
    # Max step size
    max-step: 1000000
    # Async update thread pool size
    update-thread-pool-size: 5
    
  snowflake:
    # Datacenter ID (0-31), set via environment for multi-DC
    datacenter-id: ${DATACENTER_ID:0}
    
    # Worker ID (0-31), used when ZooKeeper is disabled or as fallback
    # Set to -1 to force ZooKeeper registration
    worker-id: ${WORKER_ID:-1}
    
    # Enable ZooKeeper for distributed Worker ID management
    # When true: Worker ID is obtained from ZooKeeper
    # When false: Uses configured worker-id value
    enable-zookeeper: ${ENABLE_ZOOKEEPER:true}
    
    # Local cache file path for Worker ID persistence
    # Used for fallback when ZooKeeper is unavailable
    worker-id-cache-path: ${WORKER_ID_CACHE_PATH:/data/leaf/workerID.properties}
    
    # Epoch timestamp (milliseconds since 1970-01-01)
    # Custom epoch for Snowflake algorithm
    # Default: 2025-01-01 00:00:00 UTC
    epoch: ${SNOWFLAKE_EPOCH:1735689600000}
    
    # Clock Backwards Configuration
    clock-backwards:
      # Maximum wait time for clock to catch up (milliseconds)
      # When clock drift <= max-wait-ms, wait for clock to catch up
      # When clock drift > max-wait-ms, use cached timestamp
      max-wait-ms: ${CLOCK_BACKWARDS_MAX_WAIT:5}
      
      # Enable startup clock validation
      # When true, validates clock on startup against ZooKeeper recorded time
      startup-check-enabled: ${CLOCK_BACKWARDS_STARTUP_CHECK:true}
      
      # ZooKeeper time synchronization interval (milliseconds)
      # How often to report current timestamp to ZooKeeper
      zk-time-sync-interval: ${CLOCK_BACKWARDS_ZK_SYNC_INTERVAL:3000}
      
      # Alert threshold for clock drift (milliseconds)
      # Trigger alert when clock drift exceeds this threshold
      alert-threshold-ms: ${CLOCK_BACKWARDS_ALERT_THRESHOLD:10}
  
  # ZooKeeper Configuration
  zookeeper:
    # ZooKeeper connection string
    # Format: host1:port1,host2:port2,host3:port3
    connection-string: ${ZOOKEEPER_CONNECTION_STRING:localhost:2181}
    
    # Session timeout (milliseconds)
    # ZooKeeper session timeout - if no heartbeat within this time, session expires
    session-timeout-ms: ${ZOOKEEPER_SESSION_TIMEOUT:60000}
    
    # Connection timeout (milliseconds)
    # Maximum time to wait for initial connection to ZooKeeper
    connection-timeout-ms: ${ZOOKEEPER_CONNECTION_TIMEOUT:15000}
    
    # Base path for ZooKeeper nodes
    # All Worker ID nodes will be created under this path
    base-path: ${ZOOKEEPER_BASE_PATH:/leaf}
    
    # Service name for ZooKeeper node path
    # Used to create service-specific path: {base-path}/{service-name}/snowflake
    service-name: ${ZOOKEEPER_SERVICE_NAME:id-generator}
    
    # Retry policy configuration
    retry:
      # Maximum number of retry attempts
      max-retries: ${ZOOKEEPER_MAX_RETRIES:3}
      
      # Base sleep time between retries (milliseconds)
      # Actual sleep time increases exponentially: base-sleep-time-ms * (2 ^ retry-count)
      base-sleep-time-ms: ${ZOOKEEPER_BASE_SLEEP_TIME:1000}
      
      # Maximum sleep time between retries (milliseconds)
      # Caps the exponential backoff to prevent excessive wait times
      max-sleep-time-ms: ${ZOOKEEPER_MAX_SLEEP_TIME:10000}

logging:
  level:
    root: INFO
    com.platform.idgen: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
