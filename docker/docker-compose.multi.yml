# Multi-instance configuration for testing distributed scenarios
version: '3.8'

services:
  # Second ID Generator Server instance
  id-generator-server-2:
    build:
      context: ../../zhi-id-generator-go
      dockerfile: Dockerfile
    container_name: id-generator-server-2
    environment:
      HTTP_ADDR: :8011
      DATABASE_URL: postgres://id_gen_user:id_gen_password@id-generator-postgres:5432/id_generator?sslmode=disable
      DATACENTER_ID: 0
      WORKER_ID: -1
      SNOWFLAKE_EPOCH: 1735689600000
    ports:
      - "8012:8011"
    depends_on:
      id-generator-postgres:
        condition: service_healthy
    networks:
      - id-generator-network
    restart: unless-stopped

  # Third ID Generator Server instance
  id-generator-server-3:
    build:
      context: ../../zhi-id-generator-go
      dockerfile: Dockerfile
    container_name: id-generator-server-3
    environment:
      HTTP_ADDR: :8011
      DATABASE_URL: postgres://id_gen_user:id_gen_password@id-generator-postgres:5432/id_generator?sslmode=disable
      DATACENTER_ID: 0
      WORKER_ID: -1
      SNOWFLAKE_EPOCH: 1735689600000
    ports:
      - "8013:8011"
    depends_on:
      id-generator-postgres:
        condition: service_healthy
    networks:
      - id-generator-network
    restart: unless-stopped

networks:
  id-generator-network:
    external: true
