# ZooKeeper Configuration File
# This is a reference configuration - actual config is managed via environment variables in docker-compose.yml

# The number of milliseconds of each tick
tickTime=2000

# The number of ticks that the initial synchronization phase can take
initLimit=10

# The number of ticks that can pass between sending a request and getting an acknowledgement
syncLimit=5

# The directory where the snapshot is stored
dataDir=/data

# The directory where the transaction log is stored
dataLogDir=/datalog

# The port at which the clients will connect
clientPort=2181

# Maximum number of client connections
maxClientCnxns=60

# Disable the per-ip limit on the number of connections
# maxClientCnxns=0

# Admin server configuration
admin.enableServer=true
admin.serverPort=8080

# Autopurge configuration
# The number of snapshots to retain in dataDir
autopurge.snapRetainCount=3

# Purge task interval in hours (0 to disable auto purge)
autopurge.purgeInterval=24

# 4-letter word whitelist
4lw.commands.whitelist=*

# Metrics provider
metricsProvider.className=org.apache.zookeeper.metrics.prometheus.PrometheusMetricsProvider
metricsProvider.httpPort=7000
metricsProvider.exportJvmInfo=true
