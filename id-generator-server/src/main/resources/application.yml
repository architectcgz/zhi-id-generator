server:
  port: 8011
  tomcat:
    threads:
      max: 400
      min-spare: 20
    max-connections: 8192
    accept-count: 1000
    connection-timeout: 5s
    keep-alive-timeout: 20s

spring:
  application:
    name: id-generator-service
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:id_generator}
    username: ${DB_USER:id_gen_user}
    password: ${DB_PASSWORD:id_gen_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.platform.idgen.infrastructure.persistence.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ID Generator Configuration
id-generator:
  segment:
    # Segment cache update interval (seconds)
    cache-update-interval: 60
    # Segment duration (milliseconds)
    segment-duration: 900000
    # Max step size
    max-step: 1000000
    # Async update thread pool size
    update-thread-pool-size: 5
    
  snowflake:
    # Datacenter ID (0-31), set via environment for multi-DC
    datacenter-id: ${DATACENTER_ID:0}
    
    # Worker ID (0-31)
    # Set to -1 to force database auto-allocation
    worker-id: ${WORKER_ID:-1}

    # Local cache file path for Worker ID persistence
    worker-id-cache-path: ${WORKER_ID_CACHE_PATH:/data/leaf/workerID.properties}

    # Worker ID 租约超时时间
    # 超过此时间未续期的 Worker ID 视为过期，可被其他实例回收
    worker-id-lease-timeout: ${WORKER_ID_LEASE_TIMEOUT:10m}

    # Worker ID 租约续期间隔
    # 建议设置为 lease-timeout 的 1/3 左右
    worker-id-renew-interval: ${WORKER_ID_RENEW_INTERVAL:3m}
    
    # Epoch timestamp (milliseconds since 1970-01-01)
    # Custom epoch for Snowflake algorithm
    # Default: 2025-01-01 00:00:00 UTC
    epoch: ${SNOWFLAKE_EPOCH:1735689600000}
    
    # Clock Backwards Configuration
    clock-backwards:
      # Maximum wait time for clock to catch up (milliseconds)
      # When clock drift <= max-wait-ms, wait for clock to catch up
      # When clock drift > max-wait-ms, switch backup worker ID or refuse generation
      max-wait-ms: ${CLOCK_BACKWARDS_MAX_WAIT:5}
      
      # Alert threshold for clock drift (milliseconds)
      # Trigger alert when clock drift exceeds this threshold
      alert-threshold-ms: ${CLOCK_BACKWARDS_ALERT_THRESHOLD:10}

logging:
  level:
    root: INFO
    com.platform.idgen: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
