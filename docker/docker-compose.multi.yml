# Multi-instance configuration for testing distributed scenarios
version: '3.8'

services:
  # Second ID Generator Server instance
  id-generator-server-2:
    build:
      context: ..
      dockerfile: id-generator-server/Dockerfile
    container_name: id-generator-server-2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: id_gen_user
      DB_PASSWORD: id_gen_password
      ZOOKEEPER_CONNECTION_STRING: zookeeper:2181
      DATACENTER_ID: 0
      WORKER_ID: -1
      ENABLE_ZOOKEEPER: true
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8011:8010"
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    networks:
      - id-generator-network
    restart: unless-stopped

  # Third ID Generator Server instance
  id-generator-server-3:
    build:
      context: ..
      dockerfile: id-generator-server/Dockerfile
    container_name: id-generator-server-3
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: id_gen_user
      DB_PASSWORD: id_gen_password
      ZOOKEEPER_CONNECTION_STRING: zookeeper:2181
      DATACENTER_ID: 0
      WORKER_ID: -1
      ENABLE_ZOOKEEPER: true
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8012:8010"
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    networks:
      - id-generator-network
    restart: unless-stopped

networks:
  id-generator-network:
    external: true
