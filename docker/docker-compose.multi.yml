# Multi-instance configuration for testing distributed scenarios
version: '3.8'

services:
  # Second ID Generator Server instance
  id-generator-server-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: id-generator-server-2
    environment:
      DB_HOST: id-generator-postgres
      DB_PORT: 5432
      DB_USER: id_gen_user
      DB_PASSWORD: id_gen_password
      DATACENTER_ID: 0
      WORKER_ID: -1
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8012:8011"
    depends_on:
      id-generator-postgres:
        condition: service_healthy
    networks:
      - id-generator-network
    restart: unless-stopped

  # Third ID Generator Server instance
  id-generator-server-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: id-generator-server-3
    environment:
      DB_HOST: id-generator-postgres
      DB_PORT: 5432
      DB_USER: id_gen_user
      DB_PASSWORD: id_gen_password
      DATACENTER_ID: 0
      WORKER_ID: -1
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8013:8011"
    depends_on:
      id-generator-postgres:
        condition: service_healthy
    networks:
      - id-generator-network
    restart: unless-stopped

networks:
  id-generator-network:
    external: true
