name: id-generator-docker

services:
  id-generator-db-init:
    image: postgres:16-alpine
    container_name: id-generator-db-init
    environment:
      - DB_HOST=${DB_HOST:-shared-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-id_generator}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres123456}
    entrypoint: ["/bin/sh", "/scripts/init-id-generator-db.sh"]
    volumes:
      - ./init-id-generator-db.sh:/scripts/init-id-generator-db.sh:ro
      - ./schema/schema.sql:/schema/schema.sql:ro
    networks:
      - shared-infra
    restart: "no"

  id-generator-server:
    build:
      context: ../../zhi-id-generator-go
      dockerfile: Dockerfile
    image: id-generator-server:latest
    container_name: id-generator-server
    environment:
      - HTTP_ADDR=:8011
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123456}@${DB_HOST:-shared-postgres}:${DB_PORT:-5432}/${DB_NAME:-id_generator}?sslmode=disable
      - DATACENTER_ID=${DATACENTER_ID:-0}
      - WORKER_ID=${WORKER_ID:--1}
      - SNOWFLAKE_EPOCH=${SNOWFLAKE_EPOCH:-1735689600000}
      - WORKER_ID_LEASE_TIMEOUT=${WORKER_ID_LEASE_TIMEOUT:-10m}
      - WORKER_ID_RENEW_INTERVAL=${WORKER_ID_RENEW_INTERVAL:-3m}
      - BACKUP_WORKER_ID_COUNT=${BACKUP_WORKER_ID_COUNT:-1}
    ports:
      - "${SERVER_PORT:-8011}:8011"
    volumes:
      - id_generator_data:/data
      - id_generator_logs:/app/logs
    networks:
      - shared-infra
    depends_on:
      id-generator-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8011/api/v1/id/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.25"

networks:
  shared-infra:
    external: true

volumes:
  id_generator_data:
    name: id_generator_data
  id_generator_logs:
    name: id_generator_logs
